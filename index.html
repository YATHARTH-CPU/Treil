<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pune Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- Search Bar -->
    <div class="search-container">
        <input 
            type="text" 
            id="searchInput" 
            class="search-bar" 
            placeholder="Search city..." 
            autocomplete="off"
        >
        <button id="searchBtn" class="search-btn">🔍</button>
        <button id="themeToggleBtn" class="theme-toggle-btn">🌙</button>
        <button id="forecastBtn" class="forecast-btn">📅</button>
    </div>

    <!-- Header -->
    <div class="header">
        <div>
            <h2 id="locationTitle">📍 Pune, India</h2>
            <p id="time"></p>
        </div>
        <div class="temp">
            <h1 id="temp">--°</h1>
            <p id="condition">--</p>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loading" style="display: none; text-align: center; padding: 20px; color: #6b8fb5;">
        <p>Loading weather data...</p>
    </div>

    <!-- Green Highlight Card -->
    <div class="highlight">
        <h3>Weather Status</h3>
        <p id="status">Loading...</p>
    </div>

    <!-- Grid Data -->
    <div class="grid" id="weatherContainer"></div>

    <!-- Forecast Modal -->
    <div id="forecastModal" class="forecast-modal" style="display: none;">
        <div class="forecast-content">
            <div class="forecast-header">
                <h2>7-Day Forecast</h2>
                <button id="closeBtn" class="close-btn">&times;</button>
            </div>
            <div id="forecastContainer" class="forecast-grid"></div>
        </div>
    </div>

</div>

<script src="main.js"></script>
</body>
</html>
